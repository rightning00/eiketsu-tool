<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>英傑大戦 ダメージ計算</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="menu">

<button onclick="location.href='index.html'">
士気計算
</button>

<button onclick="location.href='damage.html'">
ダメージ計算
</button>

<button onclick="location.href='siege.html'">
攻城計算
</button>

</div>

<hr>

<h1>英傑大戦<br>ダメージシミュレーター</h1>

<h2>設定</h2>

<div class="top-setting">

    <label>

        自武力

        <select id="myPower"></select>

    </label>

    <label>

        敵武力

        <select id="enemyPower"></select>

    </label>

    <label>

        射撃発数

        <select id="shotCount"></select>

    </label>

    <label class="sniper-box">

        <input type="checkbox" id="sniper">

        狙撃

    </label>

</div>


<div id="detail"></div>

<hr>

<h2>簡易表</h2>

<label>

    攻撃種類

    <select id="attackType">

        <option value="clash">乱戦</option>
        <option value="spear">槍撃</option>
        <option value="charge">突撃</option>
        <option value="bow">弓</option>
        <option value="slash">斬撃</option>
        <option value="shot">銃（回数、狙撃は上で設定）</option>

    </select>

</label>

<div id="damageTable"></div>

<script src="damage.js"></script>

</body>

</html>
